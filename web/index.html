<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0e14">
  <title>YSCR</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>YSCR</h1>
    <div class="actions">
      <button id="speak" title="Speak replies aloud">🔊</button>
      <button id="settings-btn" title="Voice settings">⚙</button>
      <button id="refresh" title="Refresh fleet">⟳</button>
      <button id="enable-push" title="Enable notifications">🔔</button>
    </div>
  </header>

  <div id="settings" class="settings" hidden>
    <label for="silence-range">
      Pause before it sends <output id="silence-out"></output>
      <span class="hint">how long to wait after you stop talking</span>
    </label>
    <input id="silence-range" type="range" min="800" max="6000" step="100" />
    <label for="sens-range">
      Mic sensitivity <output id="sens-out"></output>
      <span class="hint">higher = picks up quieter/trailing speech</span>
    </label>
    <input id="sens-range" type="range" min="6" max="36" step="1" />
  </div>

  <div id="bg-activity" class="bg-activity" hidden aria-live="polite"></div>

  <section id="fleet" aria-label="Fleet">
    <div class="empty">Loading fleet…</div>
  </section>

  <section id="questions" aria-label="Questions awaiting you" hidden></section>

  <section id="log" aria-label="Conversation"></section>

  <div id="status" class="status-bar" hidden aria-live="polite"></div>

  <form id="composer">
    <button type="button" id="mic" title="Tap to listen hands-free; pause to send, tap to stop">🎤</button>
    <input id="msg" type="text" autocomplete="off" placeholder="Ask the concierge…" />
    <button type="submit">Send</button>
  </form>

  <!-- Project detail bottom sheet (populated on card click) -->
  <div id="detail" class="sheet-backdrop" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-label="Project detail">
      <div class="sheet-handle"></div>
      <div id="detail-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
